<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>

  <!-- 1. js-datepicker styles -->
  <link rel="stylesheet" href="https://unpkg.com/js-datepicker/dist/datepicker.min.css" />

  <!-- 2. Google Font — matches the rounded sans in the screenshot -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="card">
    <h1>Age Calculator</h1>

    <label for="birthdate">Enter your birth date:</label>

    <!-- Input + icon wrapper -->
    <div class="input-wrap">
      <input id="birthdate" type="text" placeholder="DD/MM/YYYY" readonly />
      <!-- Inline SVG calendar icon (no extra image file needed) -->
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
    </div>

    <p class="error" id="error-msg"></p>

    <button id="calc-btn">Calculate</button>

    <!-- Result line — matches "You are 21 years 10 months old" -->
    <p class="result" id="result"></p>
  </div>

  <!-- 3. js-datepicker JS -->
  <script src="https://unpkg.com/js-datepicker"></script>

  <!-- 4. Luxon JS -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  
  <script src="script.js"></script>

</body>
</html>
