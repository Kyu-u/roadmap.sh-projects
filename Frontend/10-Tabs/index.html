<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tabs</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="tabs">
      <div class="tab-links">
        <button class="tab-link active" data-tab="Tab1">First Tab</button>
        <button class="tab-link" data-tab="Tab2">Second Tab</button>
        <button class="tab-link" data-tab="Tab3">Third Tab</button>
        <button class="tab-link" data-tab="Tab4">Fourth Tab</button>
      </div>

      <div class="tab-content active" id="Tab1">
        <h2>Content for Tab 1</h2>
        <p>This is the content of Tab 1. It is shown by default.</p>
        <img src="https://via.placeholder.com/300" alt="Placeholder Image">
        <p>This is the content for Tab 1.</p>
      </div>
      <div class="tab-content" id="Tab2">
        <h2>Content for Tab 2</h2>
        <p>This is the content of Tab 2.</p>
      </div>
      <div class="tab-content" id="Tab3">
        <h2>Content for Tab 3</h2>
        <p>This is the content of Tab 3.</p>
      </div>
      <div class="tab-content" id="Tab4">
        <h2>Content for Tab 4</h2>
        <p>This is the content of Tab 4.</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
